<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HyperFlow - Agent Wallet Operations</title>
<link rel="stylesheet" href="/static/style.css" />
<style>
  :root {
    color-scheme: dark;
    --bg: #001b18;
    --bg-deep: #000f0d;
    --surface: #071f1d;
    --surface-2: #0a2926;
    --surface-3: #0d3430;
    --surface-raised: #082622;
    --line: #16453f;
    --line-strong: #277166;
    --text: #d9f4ef;
    --muted: #8ab7ae;
    --quiet: #557a73;
    --white: #f4fffc;
    --green: #4edcca;
    --green-strong: #68eadb;
    --green-soft: #0f3a35;
    --red: #ff786e;
    --red-soft: #3b1716;
    --amber: #ffc857;
    --amber-soft: #372713;
    --blue: #83b8ff;
    --blue-soft: #102b42;
    --shadow: 0 18px 44px rgba(0, 8, 7, 0.54);
    --radius: 6px;
  }

  * { box-sizing: border-box; }
  html { min-height: 100%; background: var(--bg); }
  body {
    min-height: 100vh;
    margin: 0;
    color: var(--text);
    background:
      repeating-linear-gradient(118deg, rgba(78, 220, 202, 0.045) 0 1px, transparent 1px 118px),
      linear-gradient(180deg, #052c27 0%, var(--bg) 42%, var(--bg-deep) 100%);
    font-family: "Aptos", "Helvetica Neue", "Segoe UI", sans-serif;
    font-size: 12px;
    line-height: 1.4;
    font-variant-numeric: tabular-nums;
  }

  a {
    color: var(--green-strong);
    text-decoration: none;
  }

  a:hover { text-decoration: underline; }
  a:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--green);
    outline-offset: 3px;
  }

  button {
    min-height: 40px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--white);
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: transform 120ms ease, border-color 120ms ease, background-color 120ms ease, color 120ms ease;
  }

  button:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--surface-3);
    transform: translateY(-1px);
  }

  button:disabled {
    cursor: not-allowed;
    color: var(--quiet);
    border-color: var(--line);
  }

  .page {
    width: min(1760px, 100%);
    margin: 0 auto;
    padding: 12px;
  }

  .shell {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(0, 18, 16, 0.82);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(300px, 1fr) auto;
    gap: 16px;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid rgba(78, 220, 202, 0.22);
    background: #061917;
  }

  .brand {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    color: var(--white);
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0;
  }

  .logo::before {
    content: "";
    width: 18px;
    height: 18px;
    border-radius: 6px;
    background:
      linear-gradient(135deg, transparent 0 34%, var(--green) 34% 48%, transparent 48% 100%),
      linear-gradient(45deg, transparent 0 34%, var(--green-strong) 34% 48%, transparent 48% 100%),
      #092d28;
    border: 1px solid rgba(78, 220, 202, 0.38);
  }

  .brand-sub {
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0;
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .status-pill,
  .mini-stat,
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 32px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 5px 10px;
    background: #08211e;
    color: var(--muted);
    white-space: nowrap;
  }

  .status-pill strong,
  .mini-stat strong,
  .chip strong {
    color: var(--white);
    font-weight: 650;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--amber);
  }

  .dot.live { background: var(--green); box-shadow: 0 0 0 4px rgba(66, 211, 164, 0.13); }
  .dot.dead { background: var(--red); box-shadow: 0 0 0 4px rgba(255, 128, 108, 0.12); }
  .dot.idle { background: var(--amber); box-shadow: 0 0 0 4px rgba(240, 191, 77, 0.12); }

  .refresh-btn {
    padding: 0 13px;
    border-color: rgba(78, 220, 202, 0.7);
    background: #4edcca;
    color: #00231f;
    text-transform: uppercase;
    letter-spacing: 0;
  }

  .refresh-btn:hover:not(:disabled) {
    background: var(--green-strong);
    color: #001815;
  }

  .banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255, 120, 110, 0.32);
    background: var(--red-soft);
    color: var(--white);
  }

  .banner button { min-height: 34px; padding: 0 12px; }

  main {
    display: grid;
    gap: 10px;
    padding: 12px;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
    gap: 10px;
  }

  .command-panel {
    border-color: rgba(78, 220, 202, 0.34);
  }

  .blocker-strip {
    display: grid;
    grid-template-columns: minmax(180px, 0.7fr) minmax(260px, 1.4fr) minmax(120px, 0.45fr);
    gap: 10px;
    padding: 12px;
    border-bottom: 1px solid var(--line);
    background: #041a18;
  }

  .blocker-strip.blocked {
    background:
      linear-gradient(90deg, rgba(255, 120, 110, 0.16), rgba(4, 26, 24, 0.96) 62%),
      #041a18;
  }

  .blocker-strip.ready {
    background:
      linear-gradient(90deg, rgba(78, 220, 202, 0.16), rgba(4, 26, 24, 0.96) 62%),
      #041a18;
  }

  .blocker-strip div {
    min-width: 0;
    padding: 9px 10px;
    border: 1px solid rgba(78, 220, 202, 0.16);
    border-radius: var(--radius);
    background: rgba(0, 18, 16, 0.52);
  }

  .blocker-strip span {
    display: block;
    color: var(--quiet);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .blocker-strip strong {
    display: block;
    margin-top: 4px;
    color: var(--white);
    font-size: 14px;
    line-height: 1.2;
    overflow-wrap: anywhere;
  }

  .stage-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    padding: 12px;
  }

  .stage {
    min-width: 0;
    min-height: 96px;
    display: grid;
    align-content: space-between;
    gap: 8px;
    padding: 11px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #041a18;
  }

  .stage.ready {
    border-color: rgba(78, 220, 202, 0.52);
    background: linear-gradient(180deg, rgba(15, 58, 53, 0.88), rgba(4, 26, 24, 0.96));
  }

  .stage.pending {
    border-color: rgba(255, 200, 87, 0.4);
  }

  .stage.blocked {
    border-color: rgba(255, 120, 110, 0.48);
    background: linear-gradient(180deg, rgba(59, 23, 22, 0.66), rgba(4, 26, 24, 0.96));
  }

  .stage span,
  .check-row span {
    color: var(--quiet);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stage strong {
    display: block;
    color: var(--white);
    font-size: clamp(17px, 1.8vw, 24px);
    line-height: 1;
    overflow-wrap: anywhere;
  }

  .stage small {
    color: var(--muted);
    font-size: 11px;
    overflow-wrap: anywhere;
  }

  .diagnostics-panel .panel-head {
    min-height: 53px;
  }

  .check-list {
    display: grid;
    padding: 8px 12px 12px;
  }

  .check-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 34px;
    border-bottom: 1px solid rgba(22, 69, 63, 0.68);
  }

  .check-row:last-child {
    border-bottom: 0;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
  }

  .workspace {
    display: grid;
    grid-template-columns: minmax(0, 1.52fr) minmax(360px, 0.78fr);
    gap: 10px;
  }

  .stack {
    display: grid;
    gap: 10px;
  }

  .panel {
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(7, 31, 29, 0.96);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.025);
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(13, 52, 48, 0.86), rgba(7, 31, 29, 0.78));
  }

  .panel-title {
    color: var(--green-strong);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .panel-meta {
    color: var(--quiet);
    font-size: 10px;
    white-space: nowrap;
  }

  .metric {
    min-height: 126px;
    padding: 12px;
    border-top: 2px solid rgba(78, 220, 202, 0.36);
  }

  .metric .panel-title { margin-bottom: 12px; }

  .big-num {
    min-height: 31px;
    color: var(--white);
    font-size: clamp(18px, 2.1vw, 27px);
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: 0;
    word-break: break-word;
  }

  .subline {
    margin-top: 8px;
    color: var(--muted);
    min-height: 18px;
  }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .warn { color: var(--amber); }
  .muted { color: var(--muted); }
  .quiet { color: var(--quiet); }

  .gauge {
    position: relative;
    height: 8px;
    margin-top: 13px;
    border-radius: 999px;
    background: var(--surface-3);
    overflow: hidden;
  }

  .gauge-fill {
    height: 100%;
    width: 0;
    border-radius: 999px;
    background: var(--green);
  }

  .gauge-legend {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    color: var(--quiet);
    font-size: 10px;
  }

  .wallet-card {
    display: grid;
    grid-template-columns: minmax(0, 1.15fr) minmax(420px, 0.85fr);
    gap: 12px;
    padding: 12px;
    align-items: stretch;
  }

  .wallet-address {
    min-width: 0;
    overflow-wrap: anywhere;
    color: var(--white);
    font-size: 13px;
    padding: 12px;
    border: 1px solid rgba(78, 220, 202, 0.22);
    border-radius: var(--radius);
    background: #041a18;
  }

  .wallet-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .wallet-stat {
    min-width: 0;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--surface-2);
  }

  .wallet-stat span {
    display: block;
    color: var(--quiet);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .wallet-stat strong {
    display: block;
    margin-top: 5px;
    color: var(--white);
    font-size: 14px;
    overflow-wrap: anywhere;
  }

  .table-wrap {
    overflow-x: auto;
    scrollbar-color: var(--line-strong) transparent;
  }

  .table {
    min-width: 780px;
  }

  .row,
  .table-row {
    display: grid;
    align-items: center;
    gap: 10px;
    min-height: 37px;
    padding: 7px 12px;
    border-bottom: 1px solid rgba(22, 69, 63, 0.68);
  }

  .table-row:last-child { border-bottom: 0; }

  .table-row:not(.header):hover {
    background: rgba(78, 220, 202, 0.055);
  }

  .table-row.header {
    min-height: 32px;
    color: var(--quiet);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: #061917;
  }

  .trade-row {
    grid-template-columns: 80px 66px 76px 78px 88px 54px minmax(170px, 1fr) 116px;
  }

  .spend-row {
    grid-template-columns: 86px 78px 76px 110px minmax(180px, 1fr) minmax(210px, 1.2fr) 94px;
  }

  .bridge-row {
    grid-template-columns: 98px 84px 90px 84px minmax(120px, 1fr) minmax(120px, 1fr) minmax(120px, 1fr);
  }

  .circle-bridge-row {
    grid-template-columns: 98px minmax(150px, 0.9fr) 84px 90px minmax(120px, 1fr) minmax(120px, 1fr) minmax(180px, 1.1fr);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    width: fit-content;
    padding: 2px 8px;
    border: 1px solid currentColor;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .badge.long,
  .badge.paid,
  .badge.success { color: var(--green); background: var(--green-soft); }
  .badge.short,
  .badge.failed { color: var(--red); background: var(--red-soft); }
  .badge.close,
  .badge.pending { color: var(--amber); background: var(--amber-soft); }
  .badge.hold,
  .badge.skipped { color: var(--muted); background: var(--surface-2); }

  .signal-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    min-height: 42px;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(22, 69, 63, 0.68);
  }

  .signal-row:hover {
    background: rgba(78, 220, 202, 0.045);
  }

  .signal-row:last-child { border-bottom: 0; }

  .signal-main {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }

  .conf {
    display: grid;
    grid-template-columns: 78px 38px;
    align-items: center;
    gap: 7px;
  }

  .conf-track {
    height: 8px;
    border-radius: 999px;
    overflow: hidden;
    background: #04211e;
  }

  .conf-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #2eb5a5, var(--green-strong));
  }

  .empty,
  .loading {
    min-height: 92px;
    display: grid;
    place-items: center;
    padding: 16px;
    color: var(--muted);
    text-align: center;
    background:
      repeating-linear-gradient(90deg, rgba(78, 220, 202, 0.04) 0 1px, transparent 1px 42px),
      transparent;
  }

  .loading::before {
    content: "";
    display: block;
    width: min(100%, 420px);
    height: 44px;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--surface-2), #10433d, var(--surface-2));
    background-size: 240% 100%;
  }

  .copy-btn {
    min-height: 32px;
    padding: 0 9px;
    border-color: rgba(78, 220, 202, 0.28);
    color: var(--green-strong);
    background: #061f1c;
  }

  .compact {
    min-height: 32px;
    padding: 0 10px;
  }

  .danger-btn {
    min-width: 190px;
    padding: 0 13px;
    border-color: rgba(240, 191, 77, 0.55);
    background: var(--amber-soft);
    color: var(--white);
  }

  .ops-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .screen-reader {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  footer {
    padding: 12px 16px 16px;
    color: var(--quiet);
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: no-preference) {
    .gauge-fill { transition: width 240ms ease, background-color 240ms ease; }
    .loading::before { animation: sweep 1.8s ease-in-out infinite; }
    @keyframes sweep {
      0% { background-position: 120% 0; }
      100% { background-position: -120% 0; }
    }
  }

  @media (max-width: 1180px) {
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .hero-grid { grid-template-columns: 1fr; }
    .stage-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .blocker-strip { grid-template-columns: 1fr; }
    .workspace { grid-template-columns: 1fr; }
    .ops-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 760px) {
    .page { padding: 8px; }
    .topbar { grid-template-columns: 1fr; }
    .brand { align-items: flex-start; flex-direction: column; gap: 4px; }
    .brand-sub { white-space: normal; }
    .top-actions { justify-content: flex-start; }
    .metrics { grid-template-columns: 1fr; }
    .stage-grid { grid-template-columns: 1fr; }
    .wallet-card { grid-template-columns: 1fr; }
    .wallet-grid { grid-template-columns: 1fr; }
    .danger-btn { width: 100%; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
